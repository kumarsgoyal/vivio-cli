name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify dependencies
        run: go mod verify

      - name: Format check
        run: |
          make fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'make fmt'" && exit 1)

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0

      - name: Lint
        run: golangci-lint run ./...

      - name: Build
        run: make build

      - name: Run tests
        run: go test -v -coverprofile=cover.out ./... || echo "No tests found"

      - name: Upload coverage
        if: hashFiles('cover.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: cover.out

  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: make build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          if not exist bin mkdir bin
          go build -o bin\vivio.exe .\cmd
        shell: cmd

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: ./bin/vivio version

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: .\bin\vivio.exe version
        shell: cmd
